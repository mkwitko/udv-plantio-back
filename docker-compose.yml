services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: udv-plantio-backend

    restart: unless-stopped

    env_file:
      - ./.env

    # Bound to loopback only — Cloudflare Tunnel (cloudflared on the host)
    # dials http://localhost:3333. No public port is opened.
    ports:
      - "127.0.0.1:3333:3333"

    mem_limit: 700m

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3333/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
